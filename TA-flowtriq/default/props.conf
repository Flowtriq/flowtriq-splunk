[flowtriq:incident]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = "started_at"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 25
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
category = Network & Security
description = Flowtriq DDoS incident events

# Indexed-time field extractions (backup for structured JSON)
EXTRACT-event_type = "event_type"\s*:\s*"(?<event_type>[^"]+)"
EXTRACT-incident_id = "incident_id"\s*:\s*(?<incident_id>\d+)
EXTRACT-severity = "severity"\s*:\s*"(?<severity>[^"]+)"
EXTRACT-attack_family = "attack_family"\s*:\s*"(?<attack_family>[^"]+)"
EXTRACT-peak_pps = "peak_pps"\s*:\s*(?<peak_pps>\d+)
EXTRACT-peak_bps = "peak_bps"\s*:\s*(?<peak_bps>\d+)
EXTRACT-source_ip_count = "source_ip_count"\s*:\s*(?<source_ip_count>\d+)
EXTRACT-confidence = "confidence"\s*:\s*(?<confidence>\d+)
EXTRACT-status = "status"\s*:\s*"(?<status>[^"]+)"
EXTRACT-started_at = "started_at"\s*:\s*"(?<started_at>[^"]+)"
EXTRACT-resolved_at = "resolved_at"\s*:\s*"(?<resolved_at>[^"]+)"
EXTRACT-node_name = "node_name"\s*:\s*"(?<node_name>[^"]+)"
EXTRACT-node_ip = "node_ip"\s*:\s*"(?<node_ip>[^"]+)"
EXTRACT-dashboard_url = "dashboard_url"\s*:\s*"(?<dashboard_url>[^"]+)"
